[mgr]
cwd = { fg = "#8be9fd" }
hovered = { bg = "#44475a" }
preview_hovered = { bg = "#44475a" }

# Tab bar
tab_active = { fg = "#282a36", bg = "#bd93f9" }
tab_inactive = { fg = "#f8f8f2", bg = "#44475a" }
tab_width = 1

# Markers (left edge indicators)
marker_copied = { fg = "#50fa7b", bg = "#50fa7b" }
marker_cut = { fg = "#ff5555", bg = "#ff5555" }
marker_marked = { fg = "#8be9fd", bg = "#8be9fd" }
marker_selected = { fg = "#f1fa8c", bg = "#f1fa8c" }

# File count display
count_copied = { fg = "#282a36", bg = "#50fa7b" }
count_cut = { fg = "#282a36", bg = "#ff5555" }
count_selected = { fg = "#282a36", bg = "#f1fa8c" }

# Border - set to space for minimal look
border_symbol = " "
border_style = { fg = "#44475a" }

# Find highlight
find_keyword = { fg = "#282a36", bg = "#f1fa8c", bold = true }
find_position = { fg = "#ff79c6", bg = "reset", italic = true }

[mode]
normal_main = { fg = "#282a36", bg = "#bd93f9", bold = true }
normal_alt = { fg = "#bd93f9", bg = "#44475a" }
select_main = { fg = "#282a36", bg = "#50fa7b", bold = true }
select_alt = { fg = "#50fa7b", bg = "#44475a" }
unset_main = { fg = "#282a36", bg = "#6272a4", bold = true }
unset_alt = { fg = "#6272a4", bg = "#44475a" }

[status]
sep_open = ""
sep_close = ""
sep_style = { fg = "#44475a", bg = "#44475a" }

# Permissions
perm_type = { fg = "#8be9fd" }
perm_read = { fg = "#50fa7b" }
perm_write = { fg = "#ff5555" }
perm_exec = { fg = "#f1fa8c" }
perm_sep = { fg = "#6272a4" }

# Progress bar
progress_label = { fg = "#f8f8f2", bold = true }
progress_normal = { fg = "#bd93f9", bg = "#44475a" }
progress_error = { fg = "#ff5555", bg = "#44475a" }

[pick]
border = { fg = "#bd93f9" }
active = { fg = "#ff79c6", bold = true }
inactive = { fg = "#f8f8f2" }

[input]
border = { fg = "#bd93f9" }
title = { fg = "#f8f8f2" }
value = { fg = "#f8f8f2" }
selected = { reversed = true }

[cmp]
border = { fg = "#bd93f9" }
active = { fg = "#ff79c6", bold = true }
inactive = { fg = "#f8f8f2" }
icon_file = ""
icon_folder = ""
icon_command = ""

[tasks]
border = { fg = "#bd93f9" }
title = { fg = "#f8f8f2" }
hovered = { fg = "#ff79c6", underline = true }

[which]
cols = 3
mask = { bg = "#282a36" }
cand = { fg = "#8be9fd" }
rest = { fg = "#6272a4" }
desc = { fg = "#ff79c6" }
sep = "  "
sep_style = { fg = "#44475a" }

[help]
on = { fg = "#8be9fd" }
run = { fg = "#ff79c6" }
desc = { fg = "#f8f8f2" }
hovered = { bg = "#44475a", bold = true }
footer = { fg = "#6272a4", bg = "#282a36" }

[notify]
title_info = { fg = "#50fa7b" }
title_warn = { fg = "#f1fa8c" }
title_error = { fg = "#ff5555" }
icon_info = ""
icon_warn = ""
icon_error = ""

[filetype]
rules = [
  # Directories
  { url = "*/", fg = "#bd93f9" },

  # Symlinks
  { url = "*", is = "link", fg = "#8be9fd" },
  { url = "*", is = "orphan", fg = "#ff5555" },

  # Executables
  { url = "*", is = "exec", fg = "#50fa7b" },

  # Media
  { mime = "image/*", fg = "#ff79c6" },
  { mime = "video/*", fg = "#ffb86c" },
  { mime = "audio/*", fg = "#f1fa8c" },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*}", fg = "#ff5555" },

  # Documents
  { mime = "application/pdf", fg = "#ff5555" },
  { mime = "application/{msword,vnd.openxmlformats*}", fg = "#8be9fd" },

  # Code/text
  { mime = "text/*", fg = "#50fa7b" },
  { mime = "application/json", fg = "#f1fa8c" },
  { mime = "application/{javascript,typescript}", fg = "#f1fa8c" },

  # Fallback
  { url = "*", fg = "#f8f8f2" },
]
